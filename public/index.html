<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude WebUI</title>
<link rel="stylesheet" href="/vendor/github.min.css" media="(prefers-color-scheme: light)" />
<link rel="stylesheet" href="/vendor/github-dark.min.css" media="(prefers-color-scheme: dark)" />
<link rel="stylesheet" href="/styles.css" />
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-head">
      <h2>Sessions</h2>
      <div class="sidebar-actions">
        <button id="import-btn" title="Import from Claude Code">↓</button>
        <button id="new-session-btn" title="New session">+</button>
      </div>
    </div>
    <ul id="session-list"></ul>
  </aside>

  <div id="import-modal" class="modal" hidden>
    <div class="modal-card">
      <header class="modal-head">
        <h3>Import from Claude Code</h3>
        <button id="import-close" class="icon-btn" title="Close">×</button>
      </header>
      <div class="modal-controls">
        <label>Project:
          <select id="import-project"></select>
        </label>
        <label class="checkbox-inline">
          <input type="checkbox" id="import-show-all" />
          Show all projects
        </label>
      </div>
      <ul id="import-list" class="import-list"></ul>
      <footer class="modal-foot">
        <span id="import-status" class="muted"></span>
        <button id="import-submit" type="button">Import selected</button>
      </footer>
    </div>
  </div>

  <section id="chat">
    <header>
      <h1 id="session-title">…</h1>
      <button id="stop-btn" class="icon-btn" title="Stop generating" hidden>■ Stop</button>
      <span id="status" class="status">connecting…</span>
    </header>

    <main id="log" aria-live="polite"></main>

    <form id="composer">
      <div class="composer-stack">
        <div id="attachments" class="attachments" hidden></div>
        <textarea id="input" rows="3" placeholder="Message… (Cmd/Ctrl+Enter to send, paste images to attach)" autofocus></textarea>
      </div>
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="/app.js"></script>
</body>
</html>
